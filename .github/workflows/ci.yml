name: C CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Test Vector
        run: make test-vector

      - name: Test Linked List
        run: make test-linked-list

      - name: Test Stack
        run: make test-stack

      - name: Test Queue
        run: make test-queuename: C CI

